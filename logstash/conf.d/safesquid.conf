input {
  udp {
    port => 10514
    type => "safesquid_logs"
    host => "0.0.0.0"
  }
  tcp {
    port => 10514
    type => "safesquid_logs"
    host => "0.0.0.0"
  }
}

filter {
## Performance
  if "performance" in [message] {
    mutate {
      remove_field => ["tags"]
      add_tag => ["performance"]
    }
    grok {
      match => { "message" => "^<%{NUMBER}>%{SYSLOGTIMESTAMP} %{HOSTNAME:hostname} performance %{GREEDYDATA:log_data}" }
    }
    mutate { strip => ["hostname"] }
    if [log_data] {
      mutate {
        replace => { "message" => "%{log_data}" }
        remove_field => ["pri", "month", "day", "time", "log_data"]
      }
    }
    dissect {
      mapping => {
        "message" => "%{timestamp},%{elapsed_time},%{client_connections_handled},%{client_connections_closed},%{client_transactions_handled},%{client_connections_in_pool},%{spare_client_threads},%{client_threads_in_use},%{client_threads_in_waiting},%{threads_starting_up},%{threads_reserved_for_prefetching},%{threading_errors},%{outbound_connections_created},%{outbound_connections_failed},%{outbound_connection_pool_reused},%{outbound_connections_in_pool},%{bytes_in_kb},%{bytes_out_kb},%{caching_objects_created_in_memory},%{caching_objects_removed_from_memory},%{dns_queries_reused},%{new_dns_queries},%{dns_query_failures},%{total_system_memory_kb},%{free_system_memory_kb},%{safesquid_virtual_memory_kb},%{safesquid_resident_memory_kb},%{safesquid_shared_memory_kb},%{safesquid_code_memory_kb},%{safesquid_data_memory_kb},%{safesquid_library_memory_kb},%{connections_handled_delta},%{connections_closed_delta},%{transactions_handled_delta},%{client_pool_delta},%{spare_threads_delta},%{active_threads_delta},%{threads_waiting_delta},%{threads_starting_up_delta},%{threads_prefetching_delta},%{threading_errors_delta},%{outbound_connections_created_delta},%{outbound_connections_failed_delta},%{outbound_connection_pool_reused_delta},%{outbound_connections_in_pool_delta},%{bytes_in_kb_delta},%{bytes_out_kb_delta},%{caching_objects_created_in_memory_delta},%{caching_objects_removed_from_memory_delta},%{dns_queries_reused_delta},%{new_dns_queries_delta},%{dns_query_failures_delta},%{load_avg_1min},%{load_avg_5min},%{load_avg_15min},%{running_processes},%{waiting_processes},%{user_time},%{system_time},%{total_time},%{user_time_delta},%{system_time_delta},%{total_time_delta}"
      }
    }

    mutate {
      convert => {
        "elapsed_time"                        => "integer"
        "client_connections_handled"          => "integer"
        "client_connections_closed"           => "integer"
        "client_transactions_handled"         => "integer"
        "client_connections_in_pool"          => "integer"
        "spare_client_threads"                => "integer"
        "client_threads_in_use"               => "integer"
        "client_threads_in_waiting"           => "integer"
        "threads_starting_up"                 => "integer"
        "threads_reserved_for_prefetching"    => "integer"
        "threading_errors"                    => "integer"
        "outbound_connections_created"        => "integer"
        "outbound_connections_failed"         => "integer"
        "outbound_connection_pool_reused"     => "integer"
        "outbound_connections_in_pool"        => "integer"
        "bytes_in_kb"                         => "integer"
        "bytes_out_kb"                        => "integer"
        "caching_objects_created_in_memory"   => "integer"
        "caching_objects_removed_from_memory" => "integer"
        "dns_queries_reused"                  => "integer"
        "new_dns_queries"                     => "integer"
        "dns_query_failures"                  => "integer"
        "total_system_memory_kb"              => "integer"
        "free_system_memory_kb"               => "integer"
        "safesquid_virtual_memory_kb"         => "integer"
        "safesquid_resident_memory_kb"        => "integer"
        "safesquid_shared_memory_kb"          => "integer"
        "safesquid_code_memory_kb"            => "integer"
        "safesquid_data_memory_kb"            => "integer"
        "safesquid_library_memory_kb"         => "integer"
        "connections_handled_delta"           => "integer"
        "connections_closed_delta"            => "integer"
        "transactions_handled_delta"          => "integer"
        "client_pool_delta"                   => "integer"
        "spare_threads_delta"                 => "integer"
        "active_threads_delta"                => "integer"
        "threads_waiting_delta"               => "integer"
        "threads_starting_up_delta"           => "integer"
        "threads_prefetching_delta"           => "integer"
        "threading_errors_delta"              => "integer"
        "outbound_connections_created_delta"  => "integer"
        "outbound_connections_failed_delta"   => "integer"
        "outbound_connection_pool_reused_delta" => "integer"
        "outbound_connections_in_pool_delta"  => "integer"
        "bytes_in_kb_delta"                   => "integer"
        "bytes_out_kb_delta"                  => "integer"
        "caching_objects_created_in_memory_delta"  => "integer"
        "caching_objects_removed_from_memory_delta" => "integer"
        "dns_queries_reused_delta"            => "integer"
        "new_dns_queries_delta"               => "integer"
        "dns_query_failures_delta"            => "integer"
        "load_avg_1min"                       => "float"
        "load_avg_5min"                       => "float"
        "load_avg_15min"                      => "float"
        "running_processes"                   => "integer"
        "waiting_processes"                   => "integer"
        "user_time"                           => "float"
        "system_time"                         => "float"
        "total_time"                          => "float"
        "user_time_delta"                     => "float"
        "system_time_delta"                   => "float"
        "total_time_delta"                    => "float"
      }
    }

    date {
      match => ["timestamp", "yyyyMMddHHmmss"]
      target => "@timestamp"
      timezone => "Asia/Kolkata"
    }
    if [host][ip] {
      mutate { add_field => { "server_ip" => "%{[host][ip]}" } }
    }
    mutate {
      remove_field => ["timestamp", "message", "event", "log", "host"]
    }
  }

## Extended
  if "extended" in [message] {
    mutate { add_tag => ["extended"] }
    grok {
      match => { "message" => "^<%{NUMBER}>%{SYSLOGTIMESTAMP} %{HOSTNAME:hostname} extended %{GREEDYDATA:log_data}" }
    }
    if [log_data] {
      mutate {
        replace => { "message" => "%{log_data}" }
        remove_field => ["log_data"]
      }
    }
    grok {
      match => { "message" => "\"(?<record_id>[^\"]*)\"\t\"(?<client_id>[^\"]*)\"\t\"(?<request_id>[^\"]*)\"\t\"(?<date_time>[^\"]*)\"\t\"(?<elapsed_time>[^\"]*)\"\t\"(?<status>[^\"]*)\"\t\"(?<size>[^\"]*)\"\t\"(?<upload>[^\"]*)\"\t\"(?<download>[^\"]*)\"\t\"(?<bypassed>[^\"]*)\"\t\"(?<client_ip>[^\"]*)\"\t\"(?<username>[^\"]*)\"\t\"(?<method>[^\"]*)\"\t\"(?<url>[^\"]*)\"\t\"(?<http_referer>[^\"]*)\"\t\"(?<useragent>[^\"]*)\"\t\"(?<mime>[^\"]*)\"\t\"(?<filter_name>[^\"]*)\"\t\"(?<filtering_reason>[^\"]*)\"\t\"(?<interface>[^\"]*)\"\t\"(?<cachecode>[^\"]*)\"\t\"(?<peercode>[^\"]*)\"\t\"(?<peer>[^\"]*)\"\t\"(?<request_host>[^\"]*)\"\t\"(?<request_tld>[^\"]*)\"\t\"(?<referer_host>[^\"]*)\"\t\"(?<referer_tld>[^\"]*)\"\t\"(?<range>[^\"]*)\"\t\"(?<time_profiles>[^\"]*)\"\t\"(?<user_groups>[^\"]*)\"\t\"(?<request_profiles>[^\"]*)\"\t\"(?<application_signatures>[^\"]*)\"\t\"(?<categories>[^\"]*)\"\t\"(?<response_profiles>[^\"]*)\"\t\"(?<upload_content_types>[^\"]*)\"\t\"(?<download_content_types>[^\"]*)\"\t\"(?<profiles>[^\"]*)\"" }
    }
    date {
      match => ["date_time", "dd/MMM/yyyy:HH:mm:ss"]
      target => "@timestamp"
      timezone => "Asia/Kolkata"
    }
    if [host][ip] {
      mutate { add_field => { "server_ip" => "%{[host][ip]}" } }
    }
    mutate {
      remove_field => ["date_time", "event", "host", "message"]
    }
  }
}

output {
  if "extended" in [tags] {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      ssl_verification_mode => "none"
      user => "elastic"
      password => "<ES_PASSWORD>"
      index => "safesquid-extended-%{+YYYY.MM.dd}"
      template => "/etc/logstash/templates/safesquid_ext_template.json"
      template_name => "safesquid_ext_template"
      template_overwrite => true
      manage_template => true
    }
  }
  if "performance" in [tags] {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      ssl_verification_mode => "none"
      user => "elastic"
      password => "<ES_PASSWORD>"
      index => "safesquid-perf_%{+YYYY_MM}"
      template => "/etc/logstash/templates/safesquid_perf_template.json"
      template_name => "safesquid_perf_template"
      template_overwrite => true
      manage_template => true
    }
  }
}
